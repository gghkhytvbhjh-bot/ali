name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3-dev libffi-dev libssl-dev autoconf libtool pkg-config zlib1g-dev cmake openjdk-17-jdk unzip zip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Build APK
        run: yes | buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aidadha-apk
          path: bin/*.apk
